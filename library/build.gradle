apply plugin: 'com.android.library'

android {
    compileSdkVersion 28


    defaultConfig {
        minSdkVersion 16
        targetSdkVersion 28
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    }

    resourcePrefix "com_shanbay_lib_texas_"

    testOptions {
        unitTests.returnDefaultValues = true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

ext {
    NEXUS_DEPLOY_VERSION = "1.0-local"
    NEXUS_DEPLOY_ARTIFACT_ID = "texas"
    NEXUS_DEPLOY_GROUP_ID = "com.shanbay.lib"
    NEXUS_DEPLOY_DESCRIPTION = "text engine"
    NEXUS_DEPLOY_EXCLUDE = []
}

apply from: "http://47.100.195.47/gradle/uranus.gradle"

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    implementation 'androidx.appcompat:appcompat:1.0.0'
    implementation 'androidx.recyclerview:recyclerview:1.0.0'
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test.ext:junit:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.0'
    testImplementation 'org.mockito:mockito-core:2.7.22'
    // required if you want to use Mockito for Android tests
    androidTestImplementation 'org.mockito:mockito-android:2.7.22'
    implementation 'com.github.bumptech.glide:glide:4.0.0'
    annotationProcessor "com.github.bumptech.glide:compiler:4.0.0"
    implementation "com.shanbay.lib:log:3.1"
}
